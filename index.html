<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myOrganizer: CURATOR</title>
  <meta name="description" content="CURATOR builds authoritative, reproducible retro game collections from imperfect source material using preservation DATs as the source of truth." />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #12344a 0%, #061018 45%, #020406 100%);
      color: #f4f7fb;
      font-family: Arial, sans-serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      align-items: center;
    }

    .eyebrow {
      color: #55d6ff;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.95;
      margin: 0 0 24px;
    }

    .tagline {
      font-size: 22px;
      line-height: 1.45;
      color: #d8e6ef;
      margin-bottom: 32px;
    }

    .status {
      display: inline-block;
      border: 1px solid #2ed3ff;
      color: #2ed3ff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    img {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(46, 211, 255, 0.25);
    }

    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 40px;
      color: #7893a3;
      font-size: 14px;
    }

    a {
      color: #55d6ff;
    }

    @media (max-width: 850px) {
      .page {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section>
      <div class="eyebrow">myOrganizer v.5</div>
      <h1>CURATOR</h1>

      <p class="tagline">
        CURATOR builds authoritative, reproducible retro game collections from
        imperfect source material using preservation DATs as the source of truth.
      </p>

      <div class="status">Coming Soon</div>
    </section>

    <section>
      <img src="CURATOR_packaging_cover_concept_v2.png" alt="CURATOR promotional artwork" />
    </section>
  </main>

  <footer>
    Public repository:
    <a href="https://github.com/Jiraiya1969/myOrganizer-CURATOR">GitHub</a>
  </footer>
</body>
</html>
