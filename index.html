<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myOrganizer: CURATOR</title>

    <meta name="description"
          content="CURATOR builds authoritative, reproducible retro game collections from imperfect source material using preservation DATs as the source of truth.">

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:Segoe UI,Arial,sans-serif;
            background:
                radial-gradient(circle at top,#17364d 0%,#08131c 45%,#020508 100%);
            color:#eef6ff;
        }

        .container{
            width:min(1400px,92%);
            margin:auto;
            min-height:100vh;

            display:grid;
            grid-template-columns:1.1fr .9fr;
            gap:70px;
            align-items:center;
        }

        .eyebrow{
            color:#49d8ff;
            text-transform:uppercase;
            letter-spacing:.25em;
            font-size:.9rem;
            margin-bottom:18px;
        }

        h1{
            font-size:5rem;
            line-height:.95;
            margin-bottom:30px;
            letter-spacing:-3px;
        }

        .tagline{
            font-size:2rem;
            line-height:1.45;
            color:#dbe7ef;
            max-width:700px;
            margin-bottom:40px;
        }

        .coming{
            display:inline-block;

            border:2px solid #33cfff;
            color:#33cfff;

            padding:14px 28px;

            border-radius:40px;

            text-transform:uppercase;
            letter-spacing:.12em;
            font-weight:600;
        }

        .image{
            text-align:center;
        }

        .image img{
            width:100%;
            max-width:620px;

            border-radius:18px;

            box-shadow:
                0 0 70px rgba(0,170,255,.25),
                0 20px 80px rgba(0,0,0,.60);

            transition:.35s ease;
        }

        .image img:hover{
            transform:scale(1.02);
        }

        footer{
            width:min(1400px,92%);
            margin:auto;
            padding-bottom:40px;
            color:#8da3b5;
        }

        footer a{
            color:#4dd9ff;
            text-decoration:none;
        }

        footer a:hover{
            text-decoration:underline;
        }

        @media(max-width:1100px){

            .container{
                grid-template-columns:1fr;
                text-align:center;
                padding-top:60px;
            }

            .tagline{
                margin:auto auto 40px;
            }

            h1{
                font-size:4rem;
            }

            .image{
                order:-1;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <section>

        <div class="eyebrow">
            myOrganizer v.5
        </div>

        <h1>
            CURATOR
        </h1>

        <div class="tagline">

            CURATOR builds authoritative, reproducible retro game collections
            from imperfect source material using preservation DATs as the
            source of truth.

        </div>

        <div class="coming">
            Coming Soon
        </div>

    </section>

    <section class="image">

        <img src="CURATOR_packaging_cover_concept_v2.png"
             alt="CURATOR promotional artwork">

    </section>

</div>

<footer>

    Public repository:
    <a href="https://github.com/Jiraiya1969/myOrganizer-CURATOR">
        GitHub
    </a>

</footer>

</body>
</html>
